<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Room Simulation with Avatar Agents</title>
    <script type="importmap">
    {
      "imports": {
        "three": "{{ static_url }}vendor/three/three.module.js",
        "three/addons/": "{{ static_url }}vendor/three/examples/jsm/",
        "sim_agents": "{{ static_url }}js/sim_agents.js"
      }
    }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0a0a14; color: #ccc;
        display: flex; height: 100vh; overflow: hidden; font-size: 12px;
      }
      .panel {
        width: 265px; background: #111120;
        display: flex; flex-direction: column;
        overflow-y: auto; padding: 8px; gap: 5px; flex-shrink: 0;
      }
      .panel::-webkit-scrollbar { width: 3px; }
      .panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .panel-left { border-right: 1px solid #1e1e35; }
      .panel-right { border-left: 1px solid #1e1e35; }
      .sec {
        font-size: 9px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 1.1px; color: #e94560;
        padding: 5px 0 3px; border-bottom: 1px solid #1e1e35; margin-top: 3px;
      }
      .btn {
        padding: 5px 8px; border: 1px solid #1e1e35; background: #14142a;
        color: #bbb; border-radius: 4px; cursor: pointer; font-size: 11px;
        text-align: left; transition: background .12s, border-color .12s;
      }
      .btn:hover { background: #1e1e3a; border-color: #e94560; color: #eee; }
      .btn:active { transform: scale(.97); }
      .btn:disabled { opacity: .3; cursor: not-allowed; }
      .sb {
        background: #0a0a12; border: 1px solid #1e1e35;
        border-radius: 4px; padding: 6px; margin-bottom: 2px;
      }
      #vp { flex: 1; background: #060610; position: relative; }
      canvas { display: block; width: 100%; height: 100%; }
      #status { font-size: 10px; color: #666; margin-top: 4px; line-height: 1.4; white-space: pre-wrap; }
      input[type="file"] { font-size: 9px; color: #666; padding: 2px; width: 100%; }
      .hint { font-size: 9px; color: #666; padding: 8px; text-align: center; }
      .lbl {
        position: absolute; transform: translate(-50%, -100%);
        background: rgba(14,14,28,0.8); padding: 2px 7px; border-radius: 4px;
        font-size: 9px; color: #fff; white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.12); text-align: center; pointer-events: none;
      }
      .lbl .act { display: block; color: #53d8fb; font-size: 8px; }
      .lbl .mood { margin-left: 3px; font-size: 8px; }
      .agent-chip {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 3px 7px; border-radius: 3px; border: 1px solid #1e1e35;
        cursor: pointer; font-size: 10px; margin: 1px;
      }
      .agent-chip:hover { border-color: #e94560; }
      .agent-chip.sel { border-color: #e94560; background: #1e0a1a; }
      .agent-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    </style>
  </head>
  <body>
    <div class="panel panel-left">
      <div class="sec">🌍 Room Environment</div>
      <div class="sb">
        <div style="font-size:9px;color:#666;margin-bottom:6px;">Upload a 360° panorama to generate the room</div>
        <input type="file" id="pano-file" accept="image/*" />
        <div style="display:flex;gap:4px;margin:4px 0;">
          <label style="font-size:9px;flex:1;cursor:pointer;">
            <input type="checkbox" id="pano-align" checked style="width:12px;" /> VP Align
          </label>
          <label style="font-size:9px;flex:1;cursor:pointer;">
            <input type="checkbox" id="pano-ceiling" checked style="width:12px;" /> Hide Ceiling
          </label>
        </div>
        <button class="btn" id="btn-run-pano" style="border-left:3px solid #9b59b6;width:100%;">⚙ Generate Room</button>
        <div id="pano-status" style="font-size:8px;color:#666;margin-top:3px;">No room loaded</div>
      </div>

      <div class="sec">🌅 Time of Day</div>
      <div class="sb">
        <input type="range" id="time-slider" min="0" max="24" step="0.25" value="12"
               style="width:100%;accent-color:#e94560;" />
        <div id="time-label" style="font-size:9px;color:#aaa;text-align:center;">12:00 — Noon ☀️</div>
      </div>

      <div class="sec">👥 Agents</div>
      <div class="sb" style="display:flex;gap:2px;">
        <button class="btn" id="btn-add-male" disabled style="flex:1;border-left:3px solid #53d8fb;">+ Male</button>
        <button class="btn" id="btn-add-female" disabled style="flex:1;border-left:3px solid #53d8fb;">+ Female</button>
      </div>
      <div id="agent-list" style="font-size:9px;color:#666;margin-top:2px;"></div>

      <div class="sec">📊 Selected Agent</div>
      <div id="agent-state" class="sb" style="font-size:9px;color:#555;">No agent selected</div>
    </div>

    <div id="vp">
      <div class="hint">⏳ Load a panorama above to generate the 3D room...</div>
      <div id="labels" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>
    </div>

    <div class="panel panel-right">
      <div class="sec">💬 Interactions</div>
      <div class="sb">
        <div style="font-size:9px;color:#666;margin-bottom:4px;">Select two agents to interact</div>
        <button class="btn" id="btn-greet" style="width:100%;margin-bottom:2px;">Greet</button>
        <button class="btn" id="btn-talk" style="width:100%;margin-bottom:2px;">Talk</button>
        <button class="btn" id="btn-compliment" style="width:100%;">Compliment</button>
      </div>

      <div class="sec">📸 Camera</div>
      <div class="sb" style="display:flex;gap:2px;">
        <button class="btn" style="flex:1;font-size:9px;">Orbit</button>
        <button class="btn" style="flex:1;font-size:9px;">Follow</button>
        <button class="btn" style="flex:1;font-size:9px;">FPS</button>
      </div>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
      import { AgentManager, TimeOfDayController, formatTimeLabel } from 'sim_agents';

      // ── ROOM ENVIRONMENT ──────────────────────────────────────────────
      class RoomEnvironment {
        constructor(scene) {
          this.scene = scene;
          this._mesh = null;
          this._floorPolygon = null;
          this._loader = new PLYLoader();
          this._worldScale = 10.0;
        }

        async loadFromJob(jobId) {
          const meshUrl = `/api/jobs/${jobId}/artifact/mesh/`;
          const polyUrl = `/api/jobs/${jobId}/floor_polygon/`;
          let rawPolygon = [];
          try {
            const polyResp = await fetch(polyUrl);
            const polyData = await polyResp.json();
            rawPolygon = polyData.floor_polygon || [];
          } catch (_) {}

          this._clearMesh();
          return new Promise((resolve, reject) => {
            this._loader.load(meshUrl, (geometry) => {
              geometry.computeVertexNormals();
              const mat = new THREE.MeshStandardMaterial({
                vertexColors: true, side: THREE.DoubleSide,
                roughness: 0.88, metalness: 0.02,
              });
              this._mesh = new THREE.Mesh(geometry, mat);
              this._mesh.rotation.x = -Math.PI / 2;
              this._mesh.scale.setScalar(this._worldScale);
              this._mesh.receiveShadow = true;
              this.scene.add(this._mesh);

              // ── Wall thickening: create inner shell ─────────────────────
              const WALL_THICK = 0.035;
              const innerGeo = geometry.clone();
              innerGeo.computeVertexNormals();
              const iPos = innerGeo.attributes.position;
              const iNrm = innerGeo.attributes.normal;
              for (let i = 0; i < iPos.count; i++) {
                iPos.setX(i, iPos.getX(i) - iNrm.getX(i) * WALL_THICK);
                iPos.setY(i, iPos.getY(i) - iNrm.getY(i) * WALL_THICK);
                iPos.setZ(i, iPos.getZ(i) - iNrm.getZ(i) * WALL_THICK);
              }
              // Flip normals for inner face
              for (let i = 0; i < iNrm.count; i++) {
                iNrm.setX(i, -iNrm.getX(i));
                iNrm.setY(i, -iNrm.getY(i));
                iNrm.setZ(i, -iNrm.getZ(i));
              }
              // Flip face winding
              const idx = innerGeo.index;
              if (idx) {
                for (let i = 0; i < idx.count; i += 3) {
                  const a = idx.getX(i), c = idx.getX(i+2);
                  idx.setX(i, c); idx.setX(i+2, a);
                }
              }
              const innerMat = mat.clone();
              this._innerMesh = new THREE.Mesh(innerGeo, innerMat);
              this._innerMesh.rotation.x = -Math.PI / 2;
              this._innerMesh.scale.setScalar(this._worldScale);
              this._innerMesh.receiveShadow = true;
              this.scene.add(this._innerMesh);
              // ── End wall thickening ─────────────────────────────────────

              this._mesh.updateMatrixWorld(true);
              const box = new THREE.Box3().setFromObject(this._mesh);
              const size = box.getSize(new THREE.Vector3());
              const center = box.getCenter(new THREE.Vector3());

              const TARGET_SPAN = 15;
              const horizSpan = Math.max(size.x, size.z);
              if (horizSpan > 0.001) {
                const fitScale = (TARGET_SPAN / horizSpan) * this._worldScale;
                this._mesh.scale.setScalar(fitScale);
                this._innerMesh.scale.setScalar(fitScale);
                this._mesh.updateMatrixWorld(true);
                box.setFromObject(this._mesh);
                box.getSize(size);
                box.getCenter(center);
              }

              const GRID_Y = -1.6;
              this._mesh.position.x -= center.x;
              this._mesh.position.z -= center.z;
              this._mesh.position.y = GRID_Y - box.min.y;
              // Sync inner mesh transforms
              this._innerMesh.position.copy(this._mesh.position);

              const finalScale = this._mesh.scale.x;
              this._floorPolygon = rawPolygon.map(pt => ({
                x: pt.x * finalScale - center.x,
                z: pt.z * finalScale - center.z,
              }));

              resolve(this._mesh);
            }, undefined, reject);
          });
        }

        containsPoint(x, z) {
          if (!this._floorPolygon || this._floorPolygon.length < 3) return true;
          let inside = false;
          const poly = this._floorPolygon;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i].x, zi = poly[i].z;
            const xj = poly[j].x, zj = poly[j].z;
            if ((zi > z) !== (zj > z) && x < (xj - xi) * (z - zi) / (zj - zi) + xi)
              inside = !inside;
          }
          return inside;
        }

        _clearMesh() {
          if (this._mesh) {
            this.scene.remove(this._mesh);
            this._mesh.geometry.dispose();
            this._mesh.material.dispose();
            this._mesh = null;
          }
          if (this._innerMesh) {
            this.scene.remove(this._innerMesh);
            this._innerMesh.geometry.dispose();
            this._innerMesh.material.dispose();
            this._innerMesh = null;
          }
        }
      }

      // ── PIPELINE CLIENT ───────────────────────────────────────────────
      class PipelineClient {
        async run(file, options, onStep, onComplete) {
          const fd = new FormData();
          fd.append('image', file);
          for (const [k,v] of Object.entries(options)) fd.append(k, v);
          const resp = await fetch('/api/jobs/start/', { method:'POST', body: fd });
          if (!resp.ok) {
            let msg = `HTTP ${resp.status}`;
            try { msg = (await resp.json()).error || msg; } catch(_){}
            throw new Error(msg);
          }
          const { job_id } = await resp.json();
          if (!job_id) throw new Error('No job_id returned');
          console.log('[Pipeline] Job started:', job_id);
          onStep('queued','queued','');
          // Poll
          for (let i = 0; i < 600; i++) {
            await new Promise(r => setTimeout(r, 1500));
            const sr = await fetch(`/api/jobs/${job_id}/status/`);
            const d = await sr.json();
            onStep(d.state, d.current_step, (d.logs_tail||[]).slice(-3).join('\n'));
            if (d.state === 'completed') { await onComplete(job_id, d); return; }
            if (d.state === 'failed') throw new Error(d.error || 'Failed');
          }
          throw new Error('Timeout');
        }
      }

      // ── SCENE SETUP ───────────────────────────────────────────────────
      const container = document.getElementById('vp');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x060610);
      scene.fog = new THREE.Fog(0x060610, 25, 80);

      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
      camera.position.set(5, 4, 8);

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      const hintEl = container.querySelector('.hint');
      container.insertBefore(renderer.domElement, hintEl);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.1;
      controls.target.set(0, 0, 0);

      // Grid
      const grid = new THREE.GridHelper(20, 20, 0x334863, 0x1e2b3e);
      grid.position.y = -1.6;
      scene.add(grid);

      // Ground plane (for shadows)
      const gnd = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.MeshStandardMaterial({ color: 0x101018, roughness: 0.95 })
      );
      gnd.rotation.x = -Math.PI/2;
      gnd.position.y = -1.6;
      gnd.receiveShadow = true;
      scene.add(gnd);

      const roomEnv = new RoomEnvironment(scene);

      // Time of day
      const todCtl = new TimeOfDayController(scene);
      todCtl.setHour(12);

      // Agent manager
      const agentMgr = new AgentManager(scene, camera, renderer, roomEnv);

      // Resize
      function onResize() {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener('resize', onResize);
      onResize();

      // Render loop
      (function animate() {
        requestAnimationFrame(animate);
        controls.update();
        agentMgr.update();
        renderer.render(scene, camera);
      })();

      // ── TIME OF DAY ───────────────────────────────────────────────────
      const tSlider = document.getElementById('time-slider');
      const tLabel  = document.getElementById('time-label');
      tSlider.addEventListener('input', () => {
        const h = parseFloat(tSlider.value);
        todCtl.setHour(h);
        tLabel.textContent = formatTimeLabel(h);
      });

      // ── AGENT BUTTONS ─────────────────────────────────────────────────
      const btnMale = document.getElementById('btn-add-male');
      const btnFemale = document.getElementById('btn-add-female');
      btnMale.onclick   = () => agentMgr.spawnAgent('male');
      btnFemale.onclick  = () => agentMgr.spawnAgent('female');

      // ── PIPELINE ──────────────────────────────────────────────────────
      const pipe = new PipelineClient();
      document.getElementById('btn-run-pano').addEventListener('click', async (e) => {
        const file = document.getElementById('pano-file').files[0];
        const st = document.getElementById('pano-status');
        if (!file) { st.textContent='❌ Select a file'; st.style.color='#e94560'; return; }
        e.target.disabled = true;
        st.style.color = '#aaa'; st.textContent = '⏳ Uploading...';
        const opts = {
          align_panorama: String(document.getElementById('pano-align').checked),
          ignore_ceiling: String(document.getElementById('pano-ceiling').checked),
        };
        try {
          await pipe.run(file, opts,
            (state, step, logs) => { st.textContent = `🔄 ${state}: ${step}\n${logs}`; },
            async (jobId, result) => {
              st.style.color = '#2ecc71';
              st.textContent = '✅ Loading mesh…';
              await roomEnv.loadFromJob(jobId);
              st.textContent = '✅ Room ready!';
              // Enable agent spawn buttons now that room exists
              btnMale.disabled = false;
              btnFemale.disabled = false;
              if (hintEl) hintEl.style.display = 'none';
              if (roomEnv._mesh) {
                const box = new THREE.Box3().setFromObject(roomEnv._mesh);
                const c = box.getCenter(new THREE.Vector3());
                const s = box.getSize(new THREE.Vector3());
                const d = Math.max(s.x, s.z) * 0.9;
                controls.target.set(c.x, 0, c.z);
                camera.position.set(c.x, d*0.6, c.z + d);
                controls.update();
              }
            }
          );
        } catch (err) {
          st.style.color = '#e94560';
          st.textContent = `❌ ${err.message}`;
        } finally { e.target.disabled = false; }
      });

      console.log('✅ 3D Room Simulator Ready');
    </script>
  </body>
</html>
